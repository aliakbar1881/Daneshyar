name: research_assistant
description: سیستم هوشمند تحلیل مقالات بین‌رشته‌ای

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  riverpod: ^2.6.1
  dio: ^5.9.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^17.2.3
  flutter_spinkit: ^5.2.2
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  syncfusion_flutter_pdfviewer: ^22.2.12
  path_provider: ^2.1.0

dev_dependencies:
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Vazir
      fonts:
        - asset: fonts/Vazirmatn-Regular.ttf
          weight: 400
        - asset: fonts/Vazirmatn-Medium.ttf
          weight: 500
        - asset: fonts/Vazirmatn-Bold.ttf
          weight: 700